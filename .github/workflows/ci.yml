name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install system dependencies
        # Fyne links OpenGL and X11/Wayland via cgo, so these headers are needed
        # to compile the GUI — without them golangci-lint's typecheck and the
        # test build fail (gl.pc not found).
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev libwayland-dev wayland-protocols

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Test
        run: task test-coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev libwayland-dev wayland-protocols

      - name: Build
        # Native build only: the Fyne GUI links OpenGL via cgo, so plain
        # cross-compilation does not work. Cross-platform release binaries are
        # built separately (GoReleaser) with the appropriate cgo toolchains.
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diffdiff-linux-amd64
          path: bin/
