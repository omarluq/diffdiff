version: '3'
dotenv: ['.env']

vars:
  BINARY_NAME: diffdiff
  BUILD_DIR: ./bin
  COVERAGE_FILE: coverage.out
  MAIN_PACKAGE: ./cmd/{{.BINARY_NAME}}
  # Fyne build tags. `wayland` selects the native Wayland client (no
  # X11/XWayland); `no_animations` disables Fyne's tap/popup animations so menus
  # open instantly. Override e.g. on X11-only sessions: `task build BUILD_TAGS=`.
  BUILD_TAGS: '{{.BUILD_TAGS | default "wayland no_animations"}}'

env:
  GOCACHE: '{{.ROOT_DIR}}/.gocache'
  GOMODCACHE: '{{.ROOT_DIR}}/.gomodcache'
  GOLANGCI_LINT_CACHE: '{{.ROOT_DIR}}/.tmp/golangci-lint'
  GOTMPDIR: '{{.ROOT_DIR}}/.tmp'
  TMPDIR: '{{.ROOT_DIR}}/.tmp'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  ensure-cache:
    internal: true
    cmds:
      - mkdir -p .gocache .gomodcache .tmp .tmp/golangci-lint {{.BUILD_DIR}}

  run:
    desc: Build and run
    deps: [ensure-cache, build]
    cmds:
      - '{{.BUILD_DIR}}/{{.BINARY_NAME}}'

  build:
    desc: Build binary
    deps: [ensure-cache]
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || printf dev
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || printf none
      BUILD_DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
      LDFLAGS: >-
        -X github.com/omarluq/diffdiff/internal/vinfo.Version={{.VERSION}}
        -X github.com/omarluq/diffdiff/internal/vinfo.Commit={{.COMMIT}}
        -X github.com/omarluq/diffdiff/internal/vinfo.BuildDate={{.BUILD_DATE}}
    cmds:
      - go build -tags '{{.BUILD_TAGS}}' -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PACKAGE}}

  install:
    desc: Install diffdiff as a desktop app for the current user (~/.local, no sudo)
    deps: [build]
    vars:
      APP_ID: com.omarluq.diffdiff
      PREFIX:
        sh: printf '%s/.local' "$HOME"
    cmds:
      - mkdir -p "{{.PREFIX}}/bin" "{{.PREFIX}}/share/applications" "{{.PREFIX}}/share/icons/hicolor/512x512/apps"
      - install -m 0755 "{{.BUILD_DIR}}/{{.BINARY_NAME}}" "{{.PREFIX}}/bin/{{.BINARY_NAME}}"
      - install -m 0644 assets/imgs/mascot.png "{{.PREFIX}}/share/icons/hicolor/512x512/apps/{{.APP_ID}}.png"
      - |
        cat > "{{.PREFIX}}/share/applications/{{.APP_ID}}.desktop" <<EOF
        [Desktop Entry]
        Type=Application
        Name=diffdiff
        Comment=Git working-tree diff viewer
        Exec={{.PREFIX}}/bin/{{.BINARY_NAME}}
        Icon={{.APP_ID}}
        Terminal=false
        Categories=Development;RevisionControl;
        StartupWMClass={{.APP_ID}}
        EOF
      # Refresh the desktop/icon caches when the tools exist (harmless if absent).
      - update-desktop-database "{{.PREFIX}}/share/applications" 2>/dev/null || true
      - gtk-update-icon-cache -f -t "{{.PREFIX}}/share/icons/hicolor" 2>/dev/null || true
      - 'echo "Installed diffdiff to {{.PREFIX}}. Launch from your app menu, or run {{.PREFIX}}/bin/{{.BINARY_NAME}} ({{.PREFIX}}/bin must be on PATH)."'

  uninstall:
    desc: Remove the diffdiff desktop app installed by `task install`
    vars:
      APP_ID: com.omarluq.diffdiff
      PREFIX:
        sh: printf '%s/.local' "$HOME"
    cmds:
      - rm -f "{{.PREFIX}}/bin/{{.BINARY_NAME}}"
      - rm -f "{{.PREFIX}}/share/applications/{{.APP_ID}}.desktop"
      - rm -f "{{.PREFIX}}/share/icons/hicolor/512x512/apps/{{.APP_ID}}.png"
      - update-desktop-database "{{.PREFIX}}/share/applications" 2>/dev/null || true
      - gtk-update-icon-cache -f -t "{{.PREFIX}}/share/icons/hicolor" 2>/dev/null || true
      - 'echo "Removed diffdiff from {{.PREFIX}}."'

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.COVERAGE_FILE}} coverage.html
      - rm -rf .gocache .gomodcache .tmp
      - go clean -cache -testcache

  test:
    desc: Run tests
    deps: [ensure-cache]
    cmds:
      - go test -tags '{{.BUILD_TAGS}}' -v -race ./...

  test-short:
    desc: Run short tests
    deps: [ensure-cache]
    cmds:
      - go test -tags '{{.BUILD_TAGS}}' -v -race -short ./...

  test-coverage:
    desc: Run tests with coverage
    deps: [ensure-cache]
    cmds:
      - go test -tags '{{.BUILD_TAGS}}' -v -race -coverprofile={{.COVERAGE_FILE}} -covermode=atomic ./...
      - go tool cover -html={{.COVERAGE_FILE}} -o coverage.html

  lint:
    desc: Run golangci-lint
    deps: [ensure-cache]
    cmds:
      - golangci-lint run --build-tags '{{.BUILD_TAGS}}'

  fmt:
    desc: Format and fix with golangci-lint
    deps: [ensure-cache]
    cmds:
      - golangci-lint run --build-tags '{{.BUILD_TAGS}}' --fix

  deps:
    desc: Download dependencies
    deps: [ensure-cache]
    cmds:
      - go mod download

  tidy:
    desc: Tidy dependencies
    deps: [ensure-cache]
    cmds:
      - go mod tidy

  hooks-install:
    desc: Install git hooks
    cmds:
      - lefthook install


  ci:
    desc: Run CI checks
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: build
