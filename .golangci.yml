version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  show-stats: true

linters:
  enable:
    # Core
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Quality
    - revive
    - gosec
    - bodyclose
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - godot
    - errname
    - errorlint
    - exhaustive
    - funlen
    - gocognit
    - goprintffuncname
    - lll
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - thelper
    - unconvert
    - unparam
    - whitespace
    - testpackage
    - paralleltest
    - tparallel
    - wastedassign
    - nilnil
    - exhaustruct
    - varnamelen
    - forbidigo
    - cyclop

  exclusions:
    rules:
      - linters: [all]
        path: ".*\\.pb\\.go$"
      - linters: [all]
        path: ".*_generated\\.go$"
      - linters: [lll]
        source: "^//go:generate "
      # Test fixtures legitimately build structs partially.
      - linters: [exhaustruct]
        path: "_test\\.go$"
      # GUI code (Fyne widgets) uses ExtendBaseWidget partial literals and has
      # inherently long, branch-heavy layout/render functions. Relax struct and
      # complexity linters there; correctness linters stay enabled.
      - linters: [exhaustruct, funlen, gocognit, gocyclo, cyclop, dupl, varnamelen]
        path: "internal/ui/"

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      # fieldalignment forces memory-optimal (non-semantic) field ordering. Our
      # model structs are small and not allocated in hot loops; readable,
      # logically grouped fields win over a few saved bytes.
      disable:
        - fieldalignment

    varnamelen:
      # Keep varnamelen active for genuinely cryptic names, but permit the short
      # identifiers idiomatic Go relies on (loop indices, receivers, common
      # locals) instead of forcing verbose renames.
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-names:
        - i
        - j
        - k
        - n
        - e
        - f
        - h
        - r
        - t
        - u
        - v
        - w
        - c
        - x
        - y
        - ok
        - id
        - db
        - fs
        - mu
        - wt
        - uh
        - tt

    gocyclo:
      min-complexity: 10

    gocognit:
      min-complexity: 15

    funlen:
      lines: 80
      statements: 50

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    lll:
      line-length: 120
      tab-width: 4

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    revive:
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gosec:
      config:
        global:
          nosec: true
          audit: true

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style

    exhaustruct:
      include:
        - ^github\.com/omarluq/diffdiff/.*
